apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-tracker
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-tracker
  template:
    metadata:
      labels:
        app: health-tracker
    spec:
      containers:
        - name: health-tracker
          image: asmmaa/health-tracker:latest
          ports:
            - containerPort: 3000
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: health-tracker-secrets
                  key: GROQ_API_KEY
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: health-tracker-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-tracker-secrets
                  key: JWT_SECRET
