apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-tracker
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-tracker
  template:
    metadata:
      labels:
        app: health-tracker
    spec:
      automountServiceAccountToken: false
      containers:
        - name: health-tracker
          image: asmmaa/health-tracker:v1.0.0
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "256Mi"

            limits:
              memory: "256Mi"
              cpu: "200m"
              ephemeral-storage: "256Mi"

          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: health-tracker-secrets
                  key: GROQ_API_KEY
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: health-tracker-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-tracker-secrets
                  key: JWT_SECRET